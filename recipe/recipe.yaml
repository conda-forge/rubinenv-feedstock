context:
  name: "rubin-env"
  version: "13.0.0"
  build_number: 0
  linux_gxx_abi_version: 1019
  osx_gxx_abi_version: 1002

recipe:
  name: ${{ name }}
  version: ${{ version }}

build:
  skip:
    - if: win or not match(python, "3.13.*")
      then: true
      else: false
  number: ${{ build_number }}

outputs:
  - package:
      name: rubin-env-nosysroot
      version: ${{ version }}
    build:
      script: build-nosysroot.sh
    # Since all requirements are required "at run time" for the
    # Rubin developers, all requirements are fundamentally
    # run requirements. However, we've attempted to organize
    # requirements as build-like, host-like, or run-like, in
    # order inform any evolution of this recipe.
    requirements:
      host:
        - python
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ compiler('fortran') }}
        - apr
        - cffi
        - cfitsio
        - curl
        - fftw
        - gsl
        - libaprutil
        - libboost-python-devel
        - libblas
        - libcblas
        - liblapack
        - liblapacke
        - libpq
        - libxml2
        - libxml2-devel
        - log4cxx
        - minuit2
        - ndarray
        - numpy
        - openblas
        - starlink-ast
        - wcslib
        - xpa
        - yaml-cpp
      run_constraints:
        - impi_rt == 9999999999999
      run:
        # jq is special - it is needed for the pin-it utility in this package
        - jq >=1.8.1
        ###################################################
        # build-like dependencies
        # As part of our scons build process, we do run tests, so
        # these really are required to perform a build.
        # Note that "testing" in conda-forge should be limited to testing
        # successful packaging, and not testing code.
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ compiler('fortran') }}
        - ${{ compiler('rust') }}
        # The above are needed to get the official conda-forge versions.
        # The below is needed to get convenience symlinks for users to invoke.
        - compilers >=1.9.0
        - cmake >=4.1.1
        - coverage >=7.10.0
        - cython 3.*
        - doxygen >=1.13.2
        - eups >=2.2.14
        - flake8 ==7.3.0
        - make >=4.4.1
        - meson >=1.9.0
        - pep8-naming >=0.15.1
        - pip >=25.0.1
        - pkg-config >=0.29.2
        - psutil >=7.0.0
        - pytest >=9.0.0,<10
        - pytest-cov >=6.3.0
        - pytest-doctestplus >=1.4.0
        - pytest-runner >=6.0.0
        - pytest-session2file >=0.1.11
        - pytest-vcr >=1.0.2
        - pytest-xdist >=3.8.0
        - setuptools >=80.8.0
        - scons >=4.9.1

        ###################################################
        # host-like and run-like
        # These are mostly run-like, but for the same reasons as
        # above, we need most of these at build time, so they are mostly
        # host-like
        - apr ${{ apr }}.*
        - cffi ${{ cffi }}.*
        - cfitsio ${{ cfitsio }}.*
        - eigen ${{ eigen }}.*
        - gsl ${{ gsl }}.*
        - libaprutil ${{ libaprutil }}.*
        - libblas * *openblas
        - libboost-python-devel ${{ libboost_python_devel }}.*
        - if: not linux
          then: libcxx ${{ libcxx }}.*
        - libpq >=18,<19
        - libpq ${{ libpq }}.*
        - libxml2 ${{ libxml2 }}.*
        - libxml2-devel ${{ libxml2_devel }}.*
        - llvmlite
        - log4cxx ${{ log4cxx }}.*
        - minuit2 ${{ minuit2 }}.*
        - ndarray ${{ ndarray }}.*
        - ndarray >=1.6.5
        - numba
        - numpy ${{ numpy }}.*
        - openblas
        - starlink-ast ${{ starlink_ast }}.*
        - wcslib ${{ wcslib }}.*
        - xpa ${{ xpa }}.*
        - yaml-cpp ${{ yaml_cpp }}.*

        ###################################################
        # run-like
        - alembic >=1.17.2
        - astropy-base >=7.1.1,<8
        - astroplan >=0.10.1
        - astroquery ==0.4.9
        - autograd >=1.8.0
        - backoff >=2.2.1
        - batoid >=0.8.0
        - batoid-rubin >=0.5.0
        - boto3 >=1.40.70
        - botocore >=1.40.70
        - bottleneck >=1.6.0
        - if: linux and x86_64
          then: cassandra-driver >=3.29.3
        - click >=8.3.1
        - coloredlogs >=15.0.1
        - colour-science >=0.4.6
        - configparser >=7.2.0
        - danish >=0.6.0,<0.7
        - deepdiff >=8.6.1
        - defusedxml >=0.7.1
        - deprecated >=1.3.1
        - dustmaps >=1.0.14
        - emcee >=3.1.6
        - esutil >=0.6.16
        - fastavro >=1.12.1
        - firefly-client >=3.4.0
        - fitsio >=1.3.0
        - fitsverify >=4.22
        - frozendict >=2.4.7
        - fsspec >=2025.10.0
        - future >=1.0.0
        - gaiaxpy >=2.1.2
        - galsim >=2.7.2
        - getcalspec >=2.1.0
        - git >=2.51.0
        - git-lfs >=3.7.1
        - graphviz >=13.1.2
        - h2 >=4.3.0
        - h5py >=3.15.1
        - healpy >=1.18.1
        - healsparse >=1.11.1
        - hpgeom >=1.4.0
        - htcondor >=24.0,<24.1
        - humanize >=4.14.0
        - idds-client >=2.4.1
        - idds-doma >=2.4.1
        - iminuit >=2.32.0
        - jax >=0.7.0
        - lmfit >=1.3.4,<1.4
        - lsstdesc.coord >=1.3.0
        - lsst-documenteer-guide >=2.3
        - lsst-ts-xml >=24.2.1
        - matplotlib-base >=3.10.8
        - maturin >=1.10.1
        - moto >=5.1.19
        - mpi4py >=4.1.1
        - nest-asyncio >=1.6.0
        - networkx ==3.6
        - ngmix-core >=2.4.0
        - numexpr >=2.14.1,<3
        - numpy
        - opencv >=4.12.0
        - packaging >=25.0
        - panda-client >=1.5.92
        - pandas >=2.3.3,<3
        - paramiko >=4.0.0
        - parsl ==2026.02.09
        - patch >=2.8
        - pgcli >=4.3.0
        - photutils >=2.3.0
        - piff >=1.6.0
        - pillow >=12.1.1
        - if: linux
          then: prmon >=3.1.1
        - psycopg2 >=2.9.10,<3
        - pyarrow >=20.0.0
        - pybind11 >=3.0.2
        - pydantic >=2.12.4,<3
        - pyfftw >=0.15.1
        - pyld >=2.0.4
        - pytables >=3.10.2
        - python >=3.13,<3.14
        - python-confluent-kafka >=2.12.2
        - pytorch >=2.7.1
        - pyyaml >=6.0.3
        - pz-rail-base >=1.2.8
        - pz-rail-bpz >=1.2.4
        - pz-rail-sklearn >=1.1.3
        - qp >=1.0.1
        - rclone >=1.71.2
        - requests >=2.32.5
        - rucio-clients >=38.5,<38.6
        - ruff ==0.14.5
        - s3fs >=2025.10.0
        - schwimmbad >=0.4.2
        - scikit-image >=0.25.2
        - scikit-learn >=1.7.2
        - scipy >=1.16.3,<1.17
        - seaborn >=0.13.2
        - skyproj >=2.1.1
        - sorcha >=1.1.1
        - spherematch >=0.10.2
        - sphinxcontrib-doxylink >=1.13
        - sphinx-automodapi >=0.20.0
        - sphinx-click >=6.2.0
        - sqlalchemy >=2.0.44
        - sqlite >=3.51
        - starlink-pyast
        - threadpoolctl >=3.6.0
        - torchvision >=0.24.0
        - tqdm >=4.67.1
        - treecorr >=5.1.2,<6
        - treegp >=1.4.0
        - urllib3 >=2.6.3
        - webdav4 >=0.10.0
        - ws4py >=0.5.1
        - zstandard >=0.25

    tests:
      - script:
        # grep pin-it output for python dependency
        - pin-it rubin-env-nosysroot | grep "python="
        - echo __GXX_ABI_VERSION | ${CXX} -E - | tail -1
        # ensure binary compatibility; bump major version if not
        - if: linux
          then:
            - '[ $(echo __GXX_ABI_VERSION | ${CXX} -E - | tail -1) == ${{ linux_gxx_abi_version }} ]'
        - if: osx
          then:
            - '[ $(echo __GXX_ABI_VERSION | ${CXX} -E - | tail -1) == ${{ osx_gxx_abi_version }} ]'

  - package:
      name: rubin-env
      version: ${{ version }}
    requirements:
      host:
        - python
      run:
        - ${{ pin_subpackage("rubin-env-nosysroot", exact=True) }}
        - ${{ stdlib("c") }}
        - python
    tests:
      - script:
        # grep pin-it output for python dependency
        - pin-it rubin-env | grep "python="
        - echo __GXX_ABI_VERSION | ${CXX} -E - | tail -1
        # ensure binary compatibility; bump major version if not
        - if: linux
          then:
            - '[ $(echo __GXX_ABI_VERSION | ${CXX} -E - | tail -1) == ${{ linux_gxx_abi_version }} ]'
        - if: osx
          then:
            - '[ $(echo __GXX_ABI_VERSION | ${CXX} -E - | tail -1) == ${{ osx_gxx_abi_version }} ]'

  - package:
      name: rubin-env-rsp
      version: ${{ version }}
    requirements:
      host:
        - python
      run:
        - ${{ pin_subpackage("rubin-env", exact=True) }}
        # All are from sciplat-lab unless otherwise stated
        # (*) means "grandfathered"; will be followed by justification.
        - awkward >=2.8.10  # (*); for missing data handling, we think
        - awkward-pandas >=2023.8.0  # ditto
        - bokeh >=3.8.1  # (*): predates SE-530
        - bqplot >=0.12.45  # (*): vis, unknown if used
        - ciso8601 >=2.3.3  # (*): datestamp conversion...seen in DM-33030
        - cloudpickle >=3.1.2  # (*): unknown if used
        - dask-core >=2025.11.0  # required by lsdb (RFC 1109)
        - datashader >=0.18.2  # cf bokeh
        - fastparquet >=2024.11.0  # (*): used by dask
        - ffmpeg >=7.1.1  # DM-34945
        - freetype-py >=2.5.1  # (*): unknown who needs Freetype fonts
        - geoviews >=1.15.0  # (*): used with holoviews, cf bokeh
        - gh >=2.83.1  # (*): requested by jsick long ago; nice CLI for GitHub
        - ginga >=5.4.01  # (*): numpy vis and FITS viewer
        - graphicsmagick >=1.3.45  # replaces DM-34945 imagemagick
        - hdf5plugin >=5.1.01  # lsdb (RFC 1109)  Needed for HDF5 compression
        - holoviews >=1.21.01  # (*): cf bokeh
        - httpx >=0.28.1  # (*): ubiquitous in services, handy in notebooks
        - hvplot >=0.12.2  # (*): cf bokeh
        - intake >=2.0.8  # lsdb?  (RFC 1109)
        - intake-parquet >=0.3.0  # ditto
        - ipympl >=0.10.0  # (*): needed for matplotlib widgets
        - ipykernel >=7.2.0  # (*): allows users to create custom kernels
        - jedi >=0.19.2  # (*): REPL autocompletion
        - jupyter >=1.1.1  # (*): allows users to create custom kernels
        - lsdb >=0.6.7  # RFC-1109
        - lsst-efd-client >=0.12.0  # (*): Used by T&S
        - lsst-rsp >=0.12.0  # RFC-1158
        - mermaid-py >=0.8.0  # RFC-1067
        - mysqlclient >=2.2.7  # (*): useful for debugging RSP databases
        - nbval >=0.11.0  # (*): Pytest notebook fixtures, useful for dev
        - panel >=1.8.3  # (*): cf bokeh
        - papermill >=2.6.0  # (*): goes with nbconvert
        - paramnb >=2.0.4  # (*): cf bokeh
        - partd >=1.4.2  # (*): used by dask?  Thus lsdb (RFC 1109)
        - plotly >=6.5.0  # (*): vis; athornton uses it
        - pre-commit >=4.4.0  # (*): notebook devs, please strip output...
        - pypandoc >=1.16.2  # (*): Used by typst and nbconvert
        - pyshp >=3.0.2  # (*): geospatial, use unknown
        - python-snappy >=0.7.3  # DM-24304
        - python-socketio >=5.14.3  # (*): for Kafka interaction?
        - pyvo >=1.8  # DM-16386
        - regions >=0.11  # (*): astropy plugin
        - reproject >= 0.19.0  # RFC-1152
        - ripgrep >=15.1.0  # (*): fast recursive grep; seems useful
        - rubin-nights >=0.8.1  # (*): SP-2824
        - rubin-scheduler >=3.20.1  # SP-2824
        - rubin-sim >=2.6.0  # SP-2824
        - sbpy >=0.5.0  # DM-41723
        - schedview >=0.20.0  # SP-2370
        - snappy >=1.2.2  # DM-24304
        - toolz >=1.1.0  # (*): handy library though actual use unknown
        - wget >=1.25.0  # DM-36729
        - xarray >=2025.11.0  # (*): annotated numpy arrays
    tests:
      - script:
        # grep pin-it output for xarray dependency
        - pin-it rubin-env-rsp | grep "xarray="

  - package:
      name: rubin-env-developer
      version: ${{ version }}
    requirements:
      host:
        - python
      run:
        - ${{ pin_subpackage("rubin-env", exact=True) }}
        - astrowidgets >=0.3
        - black ==25.1
        - bokeh >=3.8.1
        - if: linux
          then: clangxx >=${{ clang_llvm_version }}
        - clang-format >=${{ clang_llvm_version }}
        - clang-tools >=${{ clang_llvm_version }}
        - dask-jobqueue >=0.9.0
        - datashader >=0.18.2
        - fastparquet >=2024.11.0
        - ffmpeg >=7.1.1
        - gfal2-util >=1.9.0
        - holoviews >=1.22.0
        - hvplot >=0.12.1
        - imagemagick >=7.1.2_3
        - ipdb >=0.13.13
        - ipympl >=0.9.8
        - ipython >=9.7.0
        - isort >=6.1.0
        - jedi >=0.19.2
        - jupyter >=1.1.1
        - jupyterlab >=4.4.10,<5
        - jupyterlab_server >=2.28
        - line_profiler >=5
        - lsst-efd-client >=0.12.0
        - mermaid-py >=0.8.0
        - mypy >=1.18.2
        - mysqlclient >=2.2.7
        - panel >=1.8.3
        - pep8 >=1.7.1
        - postgresql >=18,<19
        - pre-commit >=4.3.0
        - pyct >=0.6.0
        - pydocstyle >=6.3.0
        - pyflakes >=3.4.0
        - pytest-profiling >=1.8.1
        - python-build >=1.3.0
        - python-gfal2 >=1.13.0
        - pyvo >=1.8
        - ripgrep >=15.1.0
        - rubin-nights >=0.8.1
        - rubin-scheduler >=3.20.1
        - rubin-sim >=2.6.0
        - rust-src >=1.91.0
        - schedview >=0.20.0
        - snakeviz >=2.2.2
        - types-deprecated >=1.3.1.20251101
        - types-pkg_resources >=0.1.3
        - types-python-dateutil >=2.9.0.20250822
        - types-pyyaml >=6.0.12.20250822
        - types-requests >=2.32.4.20250913
        - types-setuptools >=80.9.0.20250822
        - types-urllib3 >=1.26.25.14
    tests:
      - script:
        # grep pin-it output for black dependency
        - pin-it rubin-env-developer | grep "black"

  - package:
      name: rubin-env-extras
      version: ${{ version }}
    requirements:
      host:
        - python
      run:
        - ${{ pin_subpackage("rubin-env", exact=True) }}
        - ${{ pin_subpackage("rubin-env-rsp", exact=True) }}
        - ${{ pin_subpackage("rubin-env-developer", exact=True) }}
        - rubin-sim >=2.0.0
    tests:
      - script:
        # grep pin-it output for rubin-env-developer dependency
        # Can't do rubin-sim due to lack of ARM
        - pin-it rubin-env-extras | grep "rubin-env-developer"

about:
  homepage: https://github.com/conda-forge/rubinenv-feedstock
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Metapackage to install the Rubin Observatory's common software environment.
  description: |
    This metapackage exists to define the Rubin Observatory common software
    environment, including version specifications where needed, while allowing
    users flexibility when installing additional packages into the same environment.

extra:
  recipe-maintainers:
    - mwittgen
    - timj
    - ktlim
    - erykoff
    - beckermr
    - roceb
    - athornton
